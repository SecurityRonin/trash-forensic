site_name: trash-forensic
site_url: https://securityronin.github.io/trash-forensic/
site_description: >-
  Windows Recycle Bin $I index reader + forensic analyzer — recover deleted-file
  path, size, and deletion time; flag purged content, path traversal, and missing
  timestamps.
repo_url: https://github.com/SecurityRonin/trash-forensic
repo_name: SecurityRonin/trash-forensic

theme:
  name: material
  palette:
    scheme: slate
    primary: red
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Validation: validation.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.superfences

plugins:
  - search
