[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
# `sqlite-core` 0.1.0 (the iOS Photos.sqlite engine) pins forensicnomicon 0.4 while
# trash-forensic uses 0.5. The duplicate is transitive and isolated — trash-core's
# iOS reader uses sqlite-core's Database/Value types, not its forensicnomicon types.
skip = [{ name = "forensicnomicon", version = "<0.5" }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
